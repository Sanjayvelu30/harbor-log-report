name: Harbor Benchmark

on:
  push:
    branches: [ main ]
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

jobs:
  run-benchmark:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Harbor CLI
        run: pip install --quiet harbor-cli

      - name: Run Harbor benchmark
        # The Harbor CLI will locate the task in the current directory
        run: harbor run -p . --agent oracle
