artifacts = ["/app/dag_reconstructed.json"]

[task]
name = "git-dag-reconstruction"
description = "Reconstruct a corrupted Git repository DAG and restore branches directly from obfuscated and packfile-stored binary Git objects."

[metadata]
category = "software_engineering"
subcategory = "version_control_and_repository_operations"
task_objective = ["classify", "evaluate"]
artifact_type = ["text_or_log_file", "generated_output_artifact"]
expert_time_estimate_hours = 4.0
model_tested = "GPT-5.4"
agent_tested = "Terminus-2"
difficulty_explanation = "Reconstructing the complete DAG topology of a Git repository from loose and obfuscated packfile objects requires manually parsing binary packfiles, de-obfuscating delta-offsets, and mapping topological dependencies."
solution_explanation = "The reference solution decodes obfuscated packfile offsets, decompresses zlib streams, resolves ref-delta and offset-delta references, maps topological commit dependencies, and outputs the DAG structure and reference branch tips."
verification_explanation = "Checks that /app/dag_reconstructed.json matches the ground-truth DAG topology and that git checkout of tips yields byte-identical files."

[verifier]
timeout_sec = 120.0

[agent]
timeout_sec = 1800.0

